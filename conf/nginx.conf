#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {

  # The trailing slash on proxy_pass strips the __PATH__ prefix, so the Node
  # server always sees "/" and "/api/..." regardless of the install sub-path.
  proxy_pass http://127.0.0.1:__PORT__/;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "";

  # Learner state PUTs can be a few hundred KB.
  client_max_body_size 10m;

  # NB: SSOwat (auth + the YNH_USER / Authorization header injection) is applied
  # globally by YunoHost for this location based on the app permission — nothing
  # to configure here.

  # Include SSOwat
  include conf.d/yunohost_panel.conf.inc;
}
