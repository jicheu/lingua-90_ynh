#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "lingua90"
name = "Lingua 90"
description.en = "Offline-friendly 90-day language course with per-user progress and settings"
description.fr = "Cours de langue de 90 jours, hors-ligne, avec progression et réglages par utilisateur"

version = "0.1.0~ynh1"

maintainers = ["jcverdie"]

[upstream]
license = "MIT"
website = "https://github.com/jicheu/lingua-90"
code = "https://github.com/jicheu/lingua-90"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = true
# The app does not let users log in with their YunoHost LDAP credentials directly…
ldap = "not_relevant"
# …but it IS automatically aware of the YunoHost-portal-logged-in user (via the
# auth header SSOwat injects), and uses it as the learner's profile.
sso = true
disk = "300M"
ram.build = "768M"
ram.runtime = "100M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/"

    [install.init_main_permission]
    type = "group"
    # "all_users" => visitors must log in with their YunoHost account, and the
    # server ties each learner's progress to that account (recommended).
    # Set to "visitors" to run open profiles with no login (a shared "Who's
    # learning?" picker). Either way the app works.
    default = "all_users"

[resources]

    [resources.sources.main]
    # The application source code (THIS repository), pinned to a git tag.
    # To publish a new version: create a tag (e.g. v0.2.0), then update the
    # url + sha256 below and bump `version`. The autoupdate bot can do this for
    # you based on the latest git tag.
    #
    #   sha256:  curl -sL <url> | sha256sum
    url = "https://github.com/jicheu/lingua-90/archive/refs/tags/v0.1.0.tar.gz"
    sha256 = "48de1a8a3e0e67360f1e3f543f19b26fe8f78d7f90d529f35640f143610a1011"
    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]
    # One JSON file per learner is stored here (survives upgrades).

    [resources.permissions]
    main.url = "/"
    # Make SSOwat inject the logged-in user (YNH_USER / Authorization) so the
    # server can identify the learner. This is on by default, set explicitly
    # for clarity.
    main.auth_header = true

    [resources.ports]
    # Internal reverse-proxy port for the Node server (random, stored as $port).

    [resources.apt]
    # Debian Trixie ships Node.js 20, which is enough to build (Vite ≥18) and
    # run the zero-dependency server. npm is a separate package on Debian.
    packages = "nodejs, npm"
